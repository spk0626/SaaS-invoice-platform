<div class="login-page">
  <mat-card class="login-card">
    <mat-card-header>
      <div class="login-brand">
        <mat-icon class="login-brand-icon">receipt</mat-icon>
        <span class="login-brand-name">InvoiceApp</span>
      </div>
      <mat-card-title>Sign in to your account</mat-card-title>
    </mat-card-header>

    <mat-card-content>
      <form [formGroup]="form" (ngSubmit)="submit()" class="login-form">

        <mat-form-field appearance="outline" class="full-width">
          <mat-label>Email address</mat-label>
          <input
            matInput
            formControlName="email"
            type="email"
            autocomplete="email"
            placeholder="you@example.com">
          <mat-icon matSuffix>email</mat-icon>
          <mat-error *ngIf="form.get('email')?.hasError('required')">
            Email is required
          </mat-error>
          <mat-error *ngIf="form.get('email')?.hasError('email')">
            Enter a valid email address
          </mat-error>
        </mat-form-field>

        <mat-form-field appearance="outline" class="full-width">
          <mat-label>Password</mat-label>
          <input
            matInput
            formControlName="password"
            [type]="hidePassword ? 'password' : 'text'"
            autocomplete="current-password">
          <button
            mat-icon-button
            matSuffix
            type="button"
            (click)="hidePassword = !hidePassword">
            <mat-icon>{{ hidePassword ? 'visibility_off' : 'visibility' }}</mat-icon>
          </button>
          <mat-error *ngIf="form.get('password')?.hasError('required')">
            Password is required
          </mat-error>
          <mat-error *ngIf="form.get('password')?.hasError('minlength')">
            Minimum 8 characters
          </mat-error>
        </mat-form-field>

        <div class="login-error" *ngIf="errorMessage">
          <mat-icon>error_outline</mat-icon>
          {{ errorMessage }}
        </div>

        <button
          mat-flat-button
          color="primary"
          type="submit"
          class="login-btn"
          [disabled]="loading">
          <mat-spinner *ngIf="loading" diameter="18" class="btn-spinner" />
          {{ loading ? 'Signing in...' : 'Sign in' }}
        </button>
      </form>
    </mat-card-content>
  </mat-card>
</div>
