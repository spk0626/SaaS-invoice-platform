version: '3.8'

services:
  api:
    build:
      context: .
      dockerfile: src/Invoice.API/Dockerfile
    ports:
      - "8081:8080"
    environment:
      - ASPNETCORE_ENVIRONMENT=Development
      - ConnectionStrings__DefaultConnection=Host=postgres;Port=5432;Database=InvoiceDb;Username=invoice_user;Password=invoice_pass
      - Jwt__Key=your-super-secret-key
      - Jwt__Issuer=InvoiceAPI
      - Jwt__Audience=InvoiceAPIUsers
      - Jwt__AccessTokenExpiryMinutes=15
      - Email__SmtpHost=smtp.mailtrap.io
      - Email__SmtpPort=587
      - Email__Username=your-mailtrap-user
      - Email__Password=your-mailtrap-pass
      - Email__FromAddress=noreply@invoicesystem.com
      - Email__FromName=Invoice System
      - AllowedOrigins__0=http://localhost:4200
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped

  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: invoice_user
      POSTGRES_PASSWORD: invoice_pass
      POSTGRES_DB: InvoiceDb
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U invoice_user -d InvoiceDb"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgres_data: